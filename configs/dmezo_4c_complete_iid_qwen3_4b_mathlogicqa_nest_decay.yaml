# D-MeZO-N v1 на MathLogicQA (Russian symbolic reasoning).
#
# Этот run — финальная cross-domain валидация D-MeZO-N для paper'а.
# После него мы покрываем 4 ортогональных domain:
#   1. SST-2  — sentiment (English, lexical) [Day 1/8]
#   2. BoolQ  — passage QA (English, retrieval) [Day 2]
#   3. HellaSwag — commonsense (English, world knowledge) [2026-05-18]
#   4. MathLogicQA — symbolic logic (Russian, reasoning) [this run]
#
# Если D-MeZO-N v1 работает здесь — paper-claim cross-lingual + cross-reasoning
# generality максимально сильный, и можно делать submission.
#
# Recipe идентичен Day 8 R1d + HellaSwag federated (одинаковая R1d-recipe across
# all tasks — это и есть «практический рецепт» из paper §6.3):
#   - 4 clients complete graph IID
#   - β linear-decay 0.9 → 0
#   - ρ-clip C=50
#   - lr=3e-7, eps=1e-3, seed=42
#
# Expected outcomes (по убывающей вероятности):
#   1. PASS monotonic — final acc > init acc + 5pp. Идеальный paper outcome.
#   2. PASS stable — final acc ≈ init acc, loss небольшое уменьшение.
#      MathLogicQA очень сложна на 1000 шагов для маленькой train pool.
#   3. PARTIAL — federated > centralized, но обе деградируют.
#      Подтверждает D-MeZO-N rescue, но требует объяснения.
#   4. FAIL — federated тоже расходится. Falsification test для Theorem 3:
#      r(H) на russian symbolic logic может быть значимо выше, чем на en
#      commonsense. Тогда нужно либо tighter clip (C=20), либо иной lr.

experiment_name: dmezo_mathlogicqa_nest_decay
seed: 42
output_dir: experiments/09_dmezo_4c_complete_iid_qwen3_4b_mathlogicqa_nest_decay

model:
  name: Qwen/Qwen3-4B
  dtype: bfloat16
  flash_attention: false

data:
  task: mathlogicqa
  batch_size: 4
  max_length: 256
  num_train_examples: 700
  num_eval_examples: 200
  partition_mode: iid

mezo:
  lr: 3.0e-7
  eps: 1.0e-3
  weight_decay: 0.0
  rho_clip: 50.0

nesterov:
  enabled: true
  beta: 0.9
  beta_end: 0.0
  look_ahead: false

federated:
  num_clients: 4
  topology: complete
  consensus_mode: weight_avg
  local_steps: 1

train:
  num_rounds: 1000
  eval_every: 100
  log_every: 20
  eval_batches: 20
