# LR ablation on Qwen3-0.6B / SST-2 — Run 2/3 (lr=3e-7, middle).

experiment_name: dmezo_ablation_lr
seed: 42
output_dir: experiments/ablation_lr_qwen3_06b/lr_3e-7

model:
  name: Qwen/Qwen3-0.6B
  dtype: float16
  flash_attention: false

data:
  batch_size: 8
  max_length: 256
  num_train_examples: 1000
  num_eval_examples: 200

mezo:
  lr: 3.0e-7
  eps: 1.0e-3
  weight_decay: 0.0

train:
  steps: 1000
  eval_every: 100
  log_every: 20
  eval_batches: 20
