# Day 1 sanity check: MeZO on Qwen3-4B / SST-2.
#
# Expected wall-clock on RTX PRO 6000 Blackwell: ~1-2 hours for 1000 steps.
# Expected Colab compute units consumed: ~20-40 (depending on tariff).
#
# Success criteria:
#   - eval_loss drops by >10% over the run
#   - no NaN/Inf in projected_grad

seed: 42
output_dir: experiments/01_sanity_qwen3_4b_sst2

model:
  name: Qwen/Qwen3-4B
  dtype: bfloat16
  flash_attention: true

data:
  batch_size: 8
  max_length: 256
  num_train_examples: 1000
  num_eval_examples: 200

mezo:
  # Picked from local LR ablation on Qwen3-0.6B (2026-05-14): lr=1e-6 diverged
  # after ~step 400 (eval bounced back from 0.29 to 0.46-1.35 depending on
  # cuDNN nondeterminism); lr=3e-7 gave smooth monotonic convergence to ~0.32
  # eval loss. For Qwen3-4B we expect slightly smaller-still lr, but 3e-7 is
  # a safe middle ground (Princeton uses 1e-6 for OPT-1.3B, 1e-7 for OPT-13B).
  lr: 3.0e-7
  eps: 1.0e-3
  weight_decay: 0.0

train:
  steps: 1000
  eval_every: 100
  log_every: 20
  eval_batches: 20
