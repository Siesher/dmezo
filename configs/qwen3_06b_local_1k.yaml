# Local extended test — Run A.
#
# Day-1-like settings (bs/seq/steps as main config), but on Qwen3-0.6B
# so it fits in 8 GB VRAM on RTX 2080. Validates long-run stability
# (1000 MeZO steps), dataloader exhaustion at num_train_examples=1000,
# eval_every=200 cadence.
#
# Expected wall-clock on RTX 2080: ~5-10 minutes.
# VRAM peak: ~2-3 GB (weights 1.2 GB + activations ~1 GB).

seed: 42
output_dir: experiments/local_1k_qwen3_06b_sst2

model:
  name: Qwen/Qwen3-0.6B
  dtype: float16
  flash_attention: false

data:
  batch_size: 8
  max_length: 256
  num_train_examples: 1000
  num_eval_examples: 200

mezo:
  lr: 1.0e-6
  eps: 1.0e-3
  weight_decay: 0.0

train:
  steps: 1000
  eval_every: 200
  log_every: 20
  eval_batches: 20
